<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ED6A1"/>
      <stop offset="1" stop-color="#36C5E0"/>
    </linearGradient>
    <radialGradient id="glowTurq" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2ED6A1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2ED6A1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2970FF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2970FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background + ambient glows -->
  <rect width="1200" height="630" fill="#05070e"/>
  <circle cx="120" cy="80" r="420" fill="url(#glowTurq)"/>
  <circle cx="1120" cy="600" r="460" fill="url(#glowBlue)"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- right-side glowing globe -->
  <g transform="translate(905 322)" fill="none" stroke="#2ED6A1" stroke-opacity="0.4" stroke-width="2">
    <circle r="206" stroke-opacity="0.5"/>
    <line x1="-206" y1="0" x2="206" y2="0"/>
    <line x1="-188" y1="-86" x2="188" y2="-86" stroke-opacity="0.22"/>
    <line x1="-188" y1="86" x2="188" y2="86" stroke-opacity="0.22"/>
    <ellipse rx="78" ry="206"/>
    <ellipse rx="150" ry="206" stroke-opacity="0.25"/>
  </g>
  <!-- node dots on the globe -->
  <g fill="#2ED6A1">
    <g filter="url(#soft)" opacity="0.85">
      <circle cx="812" cy="232" r="7"/>
      <circle cx="980" cy="210" r="7"/>
      <circle cx="868" cy="318" r="7"/>
      <circle cx="1000" cy="362" r="7"/>
      <circle cx="905" cy="430" r="7"/>
    </g>
    <circle cx="812" cy="232" r="5"/>
    <circle cx="980" cy="210" r="5"/>
    <circle cx="868" cy="318" r="5"/>
    <circle cx="1000" cy="362" r="5"/>
    <circle cx="905" cy="430" r="5"/>
  </g>
  <circle cx="950" cy="280" r="5" fill="#9B8CFF"/>

  <!-- logo + wordmark -->
  <g transform="translate(80 72)">
    <rect width="92" height="92" rx="26" fill="url(#tile)"/>
    <g transform="scale(1.4375)" fill="#ffffff">
      <path d="M43.21 40.24 51 48h-7.65L30.5 35.2h8a6.4 6.4 0 1 0 0-12.8h-2.6L29.43 16h8.72A12.82 12.82 0 0 1 51 28.8c0 5.2-2.3 9.26-7.79 11.44"/>
      <path d="M20.79 23.76 13 16h7.66l12.85 12.8h-7.95a6.4 6.4 0 1 0 0 12.8h2.59l6.42 6.4h-8.72A12.82 12.82 0 0 1 13 35.2c0-5.2 2.3-9.26 7.79-11.44"/>
    </g>
    <text x="116" y="38" font-family="Noto Sans Mono, monospace" font-size="17" letter-spacing="4" fill="#2ED6A1">NETWORK CRAWLER</text>
    <text x="115" y="76" font-family="Noto Sans, sans-serif" font-weight="700" font-size="40" fill="#eef1f8">Decred Mapper</text>
  </g>

  <!-- headline -->
  <text x="82" y="318" font-family="Noto Sans, sans-serif" font-weight="700" font-size="68" fill="#eef1f8">Live map of the</text>
  <text x="82" y="398" font-family="Noto Sans, sans-serif" font-weight="700" font-size="68" fill="#eef1f8">Decred network</text>

  <!-- subtitle -->
  <text x="84" y="468" font-family="Noto Sans, sans-serif" font-size="25" fill="#9aa3b8">The crawler contacts every reachable public node — explore</text>
  <text x="84" y="503" font-family="Noto Sans, sans-serif" font-size="25" fill="#9aa3b8">them by country, network and software version.</text>

  <!-- url chip -->
  <g transform="translate(84 545)">
    <rect width="190" height="44" rx="12" fill="#2ED6A1" fill-opacity="0.1" stroke="#2ED6A1" stroke-opacity="0.3"/>
    <circle cx="24" cy="22" r="5" fill="#2ED6A1"/>
    <text x="42" y="29" font-family="Noto Sans Mono, monospace" font-size="19" fill="#2ED6A1">map.dcr.pw</text>
  </g>
</svg>
