{{define "header"}}
<!DOCTYPE html>
<html lang="en" class="{{ if eq .Theme "dark" }}dark{{ end }}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>{{ .AppName }}</title>

        <link rel="icon" type="image/svg+xml" href="{{ asset "/public/images/dcr.svg" }}">
        <link rel="stylesheet" href="{{ asset "/public/css/app.css" }}">
        <link rel="stylesheet" href="{{ asset "/public/css/vendor/leaflet-1.9.4.css" }}"/>
        <script src="{{ asset "/public/js/vendor/leaflet-1.9.4.min.js" }}"></script>
    </head>

    <body>
        <nav class="site-nav">
            <div class="nav-inner">
                <a href="/" class="brand">
                    <img src="{{ asset "/public/images/dcr.svg" }}" alt="Decred logo" width="28" height="28">
                    {{ .AppName }}
                </a>

                <ul class="nav-links">
                    <li><a class="nav-link {{ if eq .ActivePage "WorldMap" }}nav-link-active{{ end }}" href="/">World Map</a></li>
                    <li><a class="nav-link {{ if eq .ActivePage "AllNodes" }}nav-link-active{{ end }}" href="/all_nodes">All Nodes</a></li>
                    <li><a class="nav-link {{ if eq .ActivePage "UserAgents" }}nav-link-active{{ end }}" href="/user_agents">User Agents</a></li>
                </ul>

                <div class="nav-actions">
                    <form autocomplete="off" method="GET" action="/node" class="search-form">
                        <input class="input" name="ip" required placeholder="IP search" />
                        <button class="btn-primary" type="submit">Search</button>
                    </form>

                    {{ if eq .Theme "dark" }}
                    <a class="btn-ghost btn-icon" href="?{{ with .SearchIP }}ip={{ . }}&{{ end }}theme=light" title="Switch to light theme" aria-label="Switch to light theme">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    </a>
                    {{ else }}
                    <a class="btn-ghost btn-icon" href="?{{ with .SearchIP }}ip={{ . }}&{{ end }}theme=dark" title="Switch to dark theme" aria-label="Switch to dark theme">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </a>
                    {{ end }}
                </div>
            </div>
        </nav>

        <main class="container">

            <noscript>
                <div class="alert alert-warn">
                    JavaScript is disabled! Some site features will not work.
                </div>
            </noscript>
{{end}}
