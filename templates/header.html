{{define "header"}}
<!DOCTYPE html>
<html lang="en" class="{{ .Theme }}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>{{ .AppName }}</title>
        <meta name="description" content="A live world map of the Decred network. The crawler continually contacts every reachable public node — explore them by country, network and software version.">
        <meta name="theme-color" content="#05070e">

        <link rel="icon" type="image/svg+xml" href="{{ asset "/public/images/dcr.svg" }}">

        <!-- Social / Open Graph card -->
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="{{ .AppName }}">
        <meta property="og:title" content="Decred Mapper — live map of the Decred network">
        <meta property="og:description" content="The crawler continually contacts every reachable public node — explore them by country, network and software version.">
        <meta property="og:url" content="https://map.dcr.pw/">
        <meta property="og:image" content="https://map.dcr.pw{{ asset "/public/images/og-card.png" }}">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta property="og:image:alt" content="Decred Mapper — a live map of the Decred network">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Decred Mapper — live map of the Decred network">
        <meta name="twitter:description" content="The crawler continually contacts every reachable public node — explore them by country, network and software version.">
        <meta name="twitter:image" content="https://map.dcr.pw{{ asset "/public/images/og-card.png" }}">
        <meta name="twitter:image:alt" content="Decred Mapper — a live map of the Decred network">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
        <link rel="stylesheet" href="{{ asset "/public/css/app.css" }}">
        <link rel="stylesheet" href="{{ asset "/public/css/vendor/leaflet-1.9.4.css" }}"/>
        <script src="{{ asset "/public/js/vendor/leaflet-1.9.4.min.js" }}"></script>
    </head>

    <body>
        <div class="glow glow-a"></div>
        <div class="glow glow-b"></div>

        <aside class="sidebar">
            <a href="/" class="brand">
                <span class="brand-mark">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M43.21 40.24 51 48h-7.65L30.5 35.2h8a6.4 6.4 0 1 0 0-12.8h-2.6L29.43 16h8.72A12.82 12.82 0 0 1 51 28.8c0 5.2-2.3 9.26-7.79 11.44" fill="#fff"/><path d="M20.79 23.76 13 16h7.66l12.85 12.8h-7.95a6.4 6.4 0 1 0 0 12.8h2.59l6.42 6.4h-8.72A12.82 12.82 0 0 1 13 35.2c0-5.2 2.3-9.26 7.79-11.44" fill="#fff"/></svg>
                </span>
                <span class="brand-text">
                    <span class="brand-name">{{ .AppName }}</span>
                    <span class="brand-sub">Network Crawler</span>
                </span>
            </a>

            <div class="nav-eyebrow">Explore</div>
            <nav class="nav">
                <a class="nav-link {{ if eq .ActivePage "WorldMap" }}nav-link-active{{ end }}" href="/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>
                    <span>World Map</span>
                </a>
                <a class="nav-link {{ if eq .ActivePage "AllNodes" }}nav-link-active{{ end }}" href="/all_nodes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1.5"/><rect x="3" y="11" width="18" height="5" rx="1.5"/><path d="M7 6.5h.01M7 13.5h.01"/></svg>
                    <span>All Nodes</span>
                </a>
                <a class="nav-link {{ if eq .ActivePage "UserAgents" }}nav-link-active{{ end }}" href="/user_agents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l5-5-5-5M12 19h8"/></svg>
                    <span>User Agents</span>
                </a>
            </nav>

            <div class="status-card">
                <div class="status-row">
                    <span class="live-dot"></span>
                    <span class="status-title">Crawler online</span>
                </div>
                <div class="status-meta mono">continuous network sweep</div>
            </div>
        </aside>

        <div class="main">
            <header class="topbar">
                <form autocomplete="off" method="GET" action="/node" class="search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                    <input name="ip" required placeholder="Search by node IP address…" aria-label="Search by node IP address">
                </form>

                <div class="count-chip">
                    <span class="live-dot is-quiet"></span>
                    <span>{{ .Summary.GoodCount }} nodes online</span>
                </div>

                {{ if eq .Theme "dark" }}
                <a class="theme-toggle" href="?{{ with .SearchIP }}ip={{ . }}&{{ end }}theme=light" title="Switch to light theme" aria-label="Switch to light theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                </a>
                {{ else }}
                <a class="theme-toggle" href="?{{ with .SearchIP }}ip={{ . }}&{{ end }}theme=dark" title="Switch to dark theme" aria-label="Switch to dark theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </a>
                {{ end }}
            </header>

            <main class="content">

                <noscript>
                    <div class="alert alert-warn">
                        JavaScript is disabled! Some site features will not work.
                    </div>
                </noscript>
{{end}}
