{{ template "header" . }}

{{ template "summary" . }}

<section class="card clip narrow">
    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>User Agent</th>
                    <th class="right">Count</th>
                </tr>
            </thead>
            <tbody>
                {{ range $rank, $count := .Summary.UserAgents }}
                <tr>
                    <td class="num muted">{{ incr $rank }}</td>
                    <td class="mono">{{ $count.Value }}</td>
                    <td class="right num">{{ $count.Count }}</td>
                </tr>
                {{ else }}
                <tr><td colspan="3" class="empty">No nodes</td></tr>
                {{ end }}
            </tbody>
        </table>
    </div>
</section>

{{ template "footer" . }}
