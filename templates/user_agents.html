{{ template "header" . }}

{{ template "summary" . }}

<section class="card overflow-hidden lg:max-w-3xl">
    <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
            <thead class="border-b border-slate-200 bg-slate-50 text-xs uppercase tracking-wide text-slate-500 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">
                <tr>
                    <th class="px-4 py-3 font-medium">Rank</th>
                    <th class="px-4 py-3 font-medium">User Agent</th>
                    <th class="px-4 py-3 text-right font-medium">Count</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-white/5">
                {{ range $rank, $count := .Summary.UserAgents }}
                <tr class="hover:bg-slate-50 dark:hover:bg-white/5">
                    <td class="px-4 py-3 tabular-nums text-slate-400">{{ incr $rank }}</td>
                    <td class="px-4 py-3 font-mono">{{ $count.Value }}</td>
                    <td class="px-4 py-3 text-right tabular-nums">{{ $count.Count }}</td>
                </tr>
                {{ else }}
                <tr><td colspan="3" class="px-4 py-8 text-center text-slate-400">No nodes</td></tr>
                {{ end }}
            </tbody>
        </table>
    </div>
</section>

{{ template "footer" . }}
